name: V-Fit CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─── Stage 1: TEST ───────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Backend Tests
        working-directory: ./v-fit/backend
        run: mvn test -Dspring.profiles.active=test

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: v-fit/backend/target/surefire-reports/

  # ─── Stage 2: BUILD ──────────────────────────────────────────
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Spring Boot JAR
        working-directory: ./v-fit/backend
        run: mvn clean package -DskipTests

      - name: Verify Frontend builds
        working-directory: ./v-fit/frontend
        env:
          CI: false
        run: |
          npm ci
          npm run build

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: v-fit/backend/target/*.jar

  # ─── Stage 3: DEPLOY ─────────────────────────────────────────
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/v-fit/v-fit
            git pull origin main
            docker compose down
            sudo rm -rf backend/target
            mkdir -p backend/target
            cd backend
            mvn clean package -DskipTests
            cd ..
            docker compose up -d --build
            echo "✅ Deployment to https://vfitdemo.com complete!"