# Development Profile Configuration
spring:
  jpa:
    hibernate:
      ddl-auto: create-drop  # Recreate schema on startup (dev only)
    show-sql: true
  
  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

logging:
  level:
    com.vfit: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE